{% extends 'base.html' %}
{% block main %}
<h1 class="page-header">Uploaded Images</h1>
{% include 'flash_messages.html' %}

{% if images %}
<div class="image-grid">
    {% for image in images %}
    <div class="image-card">
        <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
    </div>
    {% endfor %}
</div>
{% else %}
<p>No images have been uploaded yet.</p>
{% endif %}

<style>
    .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 1.5rem;
}

@media (max-width: 768px) {
    .image-grid {
        grid-template-columns: repeat(1, 1fr);
    }
}
    .image-card {
        border: 1px solid #dee2e6;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        text-align: center;
    }

    .image-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        display: block;
    }

    .image-card p {
        padding: 0.5rem;
        font-size: 0.8rem;
        color: #555;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
</style>
{% endblock %}
